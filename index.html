<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Oh Wow Cycles</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;background:#0a1628;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;touch-action:none;font-family:'Courier New',monospace;
}

/* ── PORTRAIT layout ───────────────────────────────────────────── */
#wrap{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  width:100%;max-width:900px;padding:3px;
}
#hud{
  display:flex;flex-wrap:wrap;justify-content:center;gap:3px 10px;padding:3px 8px;
  background:#0d1f35;border:2px solid #f5d020;border-radius:4px;
  color:#f5d020;font-size:11px;letter-spacing:1px;width:100%;
}
#hud span{color:#fff}
#pu-hud{font-size:10px;color:#ffe000}
canvas{display:block;width:100%;height:auto;border:2px solid #1e4080;
  image-rendering:pixelated;image-rendering:crisp-edges;
  box-shadow:0 0 28px rgba(30,100,220,.35);}
#controls{display:flex;gap:14px}
.btn{width:80px;height:52px;background:#0d1f35;border:2px solid #f5d020;
  color:#f5d020;font-size:26px;cursor:pointer;border-radius:8px;
  user-select:none;-webkit-user-select:none;touch-action:none;}
.btn.held{background:rgba(245,208,32,0.35);color:#fff}

/* ── LANDSCAPE phone layout ────────────────────────────────────── */
@media (orientation:landscape) and (max-height:500px){
  body{flex-direction:row;align-items:stretch;}

  /* Left and right halves are the buttons */
  #btnL{
    position:fixed;left:0;top:0;
    width:18vw;height:100%;
    border-radius:0;border:none;border-right:2px solid #f5d020;
    font-size:32px;z-index:10;
    display:flex;align-items:center;justify-content:center;
  }
  #btnR{
    position:fixed;right:0;top:0;
    width:18vw;height:100%;
    border-radius:0;border:none;border-left:2px solid #f5d020;
    font-size:32px;z-index:10;
    display:flex;align-items:center;justify-content:center;
  }
  /* Hide the controls row — buttons are now the side panels */
  #controls{display:none}

  #wrap{
    flex-direction:column;align-items:center;justify-content:center;
    width:64vw;margin:0 18vw;padding:2px;gap:2px;
  }
  #hud{font-size:10px;gap:2px 8px;padding:2px 6px;}
  canvas{width:100%;max-height:calc(100vh - 58px);}
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    SCORE: <span id="score">0</span>
    &nbsp;&nbsp;CAUGHT: <span id="caught">0</span>
    &nbsp;&nbsp;MISSED: <span id="missed">0</span>
    &nbsp;&nbsp;<span id="pu-hud"></span>
  </div>
  <div style="width:100%;display:flex;gap:6px;align-items:center;padding:0 2px">
    <span style="color:#f5d020;font-size:11px;font-family:'Courier New',monospace;white-space:nowrap">LEMON DEFICIT</span>
    <div style="flex:1;height:7px;background:#0d1f35;border:1.5px solid #ff4400;border-radius:3px;overflow:hidden"><div id="deficit-bar" style="height:100%;background:#ff4400;width:0%"></div></div>
    <span style="color:#f5d020;font-size:11px;font-family:'Courier New',monospace;white-space:nowrap">GIANT HITS</span>
    <div style="flex:1;height:7px;background:#0d1f35;border:1.5px solid #ff8800;border-radius:3px;overflow:hidden"><div id="strike-bar" style="height:100%;background:#ff8800;width:0%"></div></div>
  </div>
  <canvas id="game"></canvas>
  <div id="controls">
    <button class="btn" id="btnL">&#9664;</button>
    <button class="btn" id="btnR">&#9654;</button>
  </div>
</div>

const SW = 130, SH = 97;   // sprite pixel dims
// Cargo basket: left side of sprite (behind rider)
const BKT_L = 0, BKT_R = 41, BKT_T = 48, BKT_B = 82;
// Wheel positions (sprite-relative) for spin overlay
const FWX = 114, FWY = 85, RWX = 15, RWY = 85, WR = 15;

// ── Canvas ───────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const VW = 640, VH = 270;   // viewport size (logical px)
canvas.width = VW; canvas.height = VH;

// ── World constants ───────────────────────────────────────────────
const GROUND_Y  = VH - 42;   // top of path strip
const PATH_H    = 20;
const BEACH_H   = 12;
const WATER_Y   = GROUND_Y + PATH_H + BEACH_H;
const WORLD_W   = 99999;     // effectively infinite road
const TRIKE_SPD = 4;         // px/frame trike moves in world

// World is infinite. Camera follows trike centre.
// camX = world X of the left edge of the viewport.

// ── State ─────────────────────────────────────────────────────────
let trike, lemons, parts, score, caught, missed, frame, state, wheelAngle, camX;
let keys = {}, holdL = false, holdR = false;

// Scenery: stored as world-X positions so they stay put as camera scrolls
let palmTrees, clouds, dashMarkers, pebbles, waves;

function initScenery() {
  // Palms scattered along the world
  palmTrees = [];
  for (let i = 0; i < 200; i++) {
    palmTrees.push({ wx: i * 220 + Math.random() * 160, h: 36 + Math.random() * 22 });
  }
  // Clouds: screen-relative (parallax layer — slow drift independent of world)
  clouds = Array.from({length: 7}, (_, i) => ({
    x: i * 120 + Math.random() * 60,
    y: 10 + Math.random() * 48,
    w: 44 + Math.random() * 56
  }));
  // Road dashes: world-X positions
  dashMarkers = [];
  for (let i = 0; i < 2000; i++) dashMarkers.push({ wx: i * 46 });
  // Beach pebbles
  pebbles = [];
  for (let i = 0; i < 600; i++) {
    pebbles.push({
      wx: i * (WORLD_W / 600) + Math.random() * 30,
      y: GROUND_Y + PATH_H + 2 + Math.random() * (BEACH_H - 4),
      w: 2 + Math.floor(Math.random() * 3)
    });
  }
  // Ocean waves: screen-X positions (wave positions don't scroll)
  waves = Array.from({length: 18}, (_, i) => ({
    x: i * (VW / 18 * 1.1),
    y: WATER_Y + 3 + Math.random() * 5,
    w: 16 + Math.random() * 28,
    ph: Math.random() * Math.PI * 2
  }));
}

function resetGame() {
  trike = { wx: 300, spd: TRIKE_SPD }; // world X of trike left edge
  camX  = trike.wx - VW / 2 + SW / 2;  // center trike in viewport
  lemons = []; parts = [];
  score = 0; caught = 0; missed = 0; health = 10; strikes = 0; hitCooldown = 0;
  frame = 0; wheelAngle = 0;
  powerups=[]; activeSuperSpeed=0; activeMagnet=0; powerupTimer=0;
  giantLemon = { wx: trike.wx - VW * 0.6, r: 55, rot: 0, spd: 1.0, dist: 0 };
  initScenery();
  updateHUD();
}

function updateHUD() {
  document.getElementById('score').textContent  = score;
  document.getElementById('caught').textContent = caught;
  document.getElementById('missed').textContent = missed;
  // Lemon deficit bar: (missed - caught) / 20 * 100%
  const deficit = Math.max(0, missed - caught);
  document.getElementById('deficit-bar').style.width = Math.min(100, deficit/20*100) + '%';
  // Strike bar: strikes / 10 * 100%
  document.getElementById('strike-bar').style.width = Math.min(100, strikes/10*100) + '%';
}
function updatePowerupHUD() {
  const el = document.getElementById('pu-hud');
  const s = [];
  if (activeSuperSpeed > 0) s.push('SPEED ' + Math.ceil(activeSuperSpeed/60) + 's');
  if (activeMagnet > 0)     s.push('MAGNET ' + Math.ceil(activeMagnet/60) + 's');
  el.textContent = s.join('  ');
}

// ── Particles & floating text ─────────────────────────────────────
function burst(sx, sy, colors, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 0.8 + Math.random() * 3;
    parts.push({ sx, sy, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1.5,
      life: 1, decay: 0.04 + Math.random()*0.04,
      r: 1.5 + Math.random()*3,
      color: colors[Math.floor(Math.random() * colors.length)] });
  }
}
function floatText(sx, sy, txt) {
  parts.push({ sx, sy, vx: 0, vy: -1.1, life: 1, decay: 0.018,
    r: 0, text: txt, color: '#f5d020' });
}

// ── Lemon spawning ────────────────────────────────────────────────
// Lemons spawn at random world-X positions within a window ahead of the trike.
// They fall straight down. Camera following means they appear to drift slightly
// if trike moves, but their world position is fixed.
let lemonTimer = 0;
function maybeSpawnLemon() {
  lemonTimer++;
  // Random interval 40-120 frames; occasionally spawn 2 at once
  const interval = 40 + Math.random() * 80;
  if (lemonTimer >= interval) {
    lemonTimer = 0;
    const count = Math.random() < 0.25 ? 2 : 1; // 25% chance of double drop
    for (let i = 0; i < count; i++) {
      // Spawn within ~3 screen widths centred on trike
      const wx = trike.wx + (Math.random() - 0.3) * VW * 1.5;
      lemons.push({
        wx,                                        // world X — fixed
        y: -14,
        vy: 0.9 + Math.random() * 2.2,            // varied fall speed
        rot: 0,
        rotSpd: (Math.random() - 0.5) * 0.15,
        r: 9
      });
    }
  }
}


function maybeSpawnPowerup() {
  powerupTimer++;
  if (powerupTimer >= 300 + Math.floor(Math.random() * 300)) {
    powerupTimer = 0;
    const type = Math.random() < 0.5 ? 'speed' : 'magnet';
    const wx = trike.wx + (Math.random() - 0.3) * VW * 1.5;
    const duration = Math.floor((3 + Math.random() * 27) * 60);
    powerups.push({ wx, y: -20, vy: 0.8 + Math.random() * 1.8,
      rot: 0, rotSpd: (Math.random()-0.5)*0.1, r: 13, type, duration });
  }
}

// ── Update ────────────────────────────────────────────────────────
function update() {
  frame++;

  // Move trike in world space
  const movingL = keys['ArrowLeft']  || keys['a'] || holdL;
  const movingR = keys['ArrowRight'] || keys['d'] || holdR;
  if (movingL) trike.wx -= trike.spd;
  if (movingR) trike.wx += trike.spd;
  trike.wx = Math.max(0, Math.min(WORLD_W - SW, trike.wx));

  // Camera follows trike — keep trike centred horizontally
  const targetCam = trike.wx - VW / 2 + SW / 2;
  camX += (targetCam - camX) * 0.15;  // smooth follow

  // Wheel spins when moving
  if (movingL || movingR) wheelAngle += trike.spd * 0.055;

  // Cloud drift (screen-space, independent of world scroll)
  for (const c of clouds) {
    c.x -= 0.08;
    if (c.x + c.w < -10) c.x = VW + 10 + Math.random() * 60;
  }


  // ── Giant lemon ──────────────────────────────────────────────────
  {
    const distToTrike = trike.wx - giantLemon.wx;
    const closeBoost = distToTrike < VW * 0.5
      ? Math.max(0, (VW*0.5 - distToTrike) / (VW*0.5)) * 1.3 : 0;
    const ramp = Math.min(4.8, giantLemon.dist / 3000);  // grows 0→4.8 over 14400 units
    giantLemon.spd = 1.2 + ramp + closeBoost;
    giantLemon.wx  += giantLemon.spd;
    giantLemon.dist += giantLemon.spd;
    giantLemon.rot += giantLemon.spd * 0.018;
    // Shove trike if it touches — cooldown prevents rapid multi-hit
    if (distToTrike < giantLemon.r + SW * 0.4) {
      trike.wx += 8;
      const gsx = giantLemon.wx - camX;
      burst(gsx + giantLemon.r, GROUND_Y - SH/2, ['#f5d020','#ffe95a','#fff176'], 18);
      if (hitCooldown <= 0) {
        strikes++;
        hitCooldown = 90;  // 1.5s cooldown between strikes
        floatText(gsx, GROUND_Y - SH - 10, 'HIT! ' + strikes + '/10');
        updateHUD();
        if (strikes >= 10) { state = 'over'; }
      }
    }
    if (hitCooldown > 0) hitCooldown--;
  }

  // Spawn lemons
  maybeSpawnLemon();
  maybeSpawnPowerup();

  // Tick active powerups
  if (activeSuperSpeed > 0) { activeSuperSpeed--; trike.spd = activeSuperSpeed > 0 ? 11 : TRIKE_SPD; }
  if (activeMagnet > 0) activeMagnet--;
  if (frame % 6 === 0) updatePowerupHUD();

  // Magnet: pull falling lemons toward basket world-X
  if (activeMagnet > 0) {
    const bCx = trike.wx + (BKT_L + BKT_R) / 2;
    for (const l of lemons) { const dx = bCx - l.wx; l.wx += dx * 0.05; }
  }

  // Update powerup pickups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.y += pu.vy; pu.rot += pu.rotSpd;
    const psx = pu.wx - camX;
    const tsx  = trike.wx - camX;
    const bx1 = tsx + BKT_L - 10, bx2 = tsx + BKT_R + 10;
    const by1 = GROUND_Y - SH + BKT_T - 10, by2 = GROUND_Y - SH + BKT_B + 10;
    if (psx+pu.r > bx1 && psx-pu.r < bx2 && pu.y+pu.r > by1 && pu.y-pu.r < by2) {
      if (pu.type === 'speed') {
        activeSuperSpeed = pu.duration; trike.spd = 11;
        burst(psx, pu.y, ['#ffe000','#ffffff','#44ddff'], 16);
        floatText(psx, pu.y - 16, 'SUPER SPEED!');
      } else {
        activeMagnet = pu.duration;
        burst(psx, pu.y, ['#ff44ff','#ffffff','#ff99ff'], 16);
        floatText(psx, pu.y - 16, 'MAGNET!');
      }
      powerups.splice(i, 1); updatePowerupHUD(); continue;
    }
    if (pu.y - pu.r > GROUND_Y || psx < -VW*2 || psx > VW*3) powerups.splice(i, 1);
  }

  // Update lemons
  for (let i = lemons.length - 1; i >= 0; i--) {
    const l = lemons[i];
    l.y += l.vy;
    l.rot += l.rotSpd;

    // Lemon screen X = lemon world X - camX
    const lsx = l.wx - camX;

    // Basket position in screen space
    const tsx  = trike.wx - camX;          // trike screen X
    const bx1 = tsx + BKT_L, bx2 = tsx + BKT_R;
    const by1 = GROUND_Y - SH + BKT_T, by2 = GROUND_Y - SH + BKT_B;

    if (lsx + l.r > bx1 && lsx - l.r < bx2 && l.y + l.r > by1 && l.y - l.r < by2) {
      burst(lsx, l.y, ['#f5d020','#ffe95a','#fff9a0'], 12);
      floatText(lsx, l.y - 14, '+10');
      lemons.splice(i, 1);
      score += 10; caught++;
      updateHUD(); continue;
    }
    // Splat on ground — just remove, count as missed
    if (l.y - l.r > GROUND_Y) {
      burst(lsx, GROUND_Y, ['#c8a000','#8a6000'], 4);
      lemons.splice(i, 1);
      missed++;
      updateHUD();
      if (missed - caught >= 20) { state = 'over'; }
    }
    // Cull if far off screen (> 2 screens away)
    if (lsx < -VW * 2 || lsx > VW * 3) lemons.splice(i, 1);
  }

  // Update particles
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.sx += p.vx; p.sy += p.vy;
    if (!p.text) p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) parts.splice(i, 1);
  }
}

// ── Draw helpers ──────────────────────────────────────────────────
function wx2sx(wx) { return wx - camX; }  // world X → screen X

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#1a4a8a'); g.addColorStop(0.45, '#3a80c8');
  g.addColorStop(0.82, '#6ab4e8'); g.addColorStop(1, '#aad8f2');
  ctx.fillStyle = g; ctx.fillRect(0, 0, VW, GROUND_Y);
}

function drawSun() {
  const sx = VW - 80, sy = 32, sr = 20;
  const gw = ctx.createRadialGradient(sx,sy,sr*.3,sx,sy,sr*2.6);
  gw.addColorStop(0,'rgba(255,240,120,.4)'); gw.addColorStop(1,'rgba(255,230,100,0)');
  ctx.fillStyle = gw; ctx.beginPath(); ctx.arc(sx,sy,sr*2.6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffe566'; ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff9a0'; ctx.beginPath(); ctx.arc(sx-5,sy-5,sr*.38,0,Math.PI*2); ctx.fill();
}

function drawSeagulls() {
  ctx.strokeStyle = 'rgba(255,255,255,.6)'; ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    const gx = ((i*190 + frame*.28 + i*70) % (VW+100) + VW+100) % (VW+100) - 50;
    const gy = 16 + i*13 + Math.sin(frame*.035+i)*4;
    const wf = Math.sin(frame*.12+i*1.4)*3.5;
    ctx.beginPath(); ctx.moveTo(gx-9,gy+wf); ctx.quadraticCurveTo(gx,gy,gx+9,gy+wf); ctx.stroke();
  }
}

function drawClouds() {
  for (const c of clouds) {
    const h = c.w * .36;
    ctx.fillStyle = 'rgba(255,255,255,.84)';
    ctx.fillRect(c.x, c.y+h*.42, c.w, h*.58);
    ctx.fillRect(c.x+c.w*.1, c.y, c.w*.8, h*.78);
    ctx.fillRect(c.x+c.w*.28, c.y-h*.25, c.w*.44, h*.5);
  }
}

function drawPalm(sx, base, h) {
  ctx.strokeStyle = '#7a5a12'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(sx, base);
  ctx.quadraticCurveTo(sx+h*.08, base-h*.55, sx-h*.03, base-h); ctx.stroke();
  const tx = sx-h*.03, ty = base-h;
  const fronds = [[-0.95,-0.45],[-0.55,-1],[0.05,-1.12],[0.6,-0.98],[0.95,-0.48],[-1.05,.1],[1.05,.1]];
  for (const [fx,fy] of fronds) {
    ctx.strokeStyle = '#336b1a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(tx,ty);
    const ex = tx+fx*h*.28, ey = ty+fy*h*.22;
    ctx.quadraticCurveTo((tx+ex)/2+fx*h*.04,(ty+ey)/2+fy*h*.04-6,ex,ey); ctx.stroke();
  }
  ctx.fillStyle = '#5a380e';
  ctx.beginPath(); ctx.arc(tx-4,ty+5,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(tx+5,ty+4,3.2,0,Math.PI*2); ctx.fill();
}

function drawPath() {
  const pg = ctx.createLinearGradient(0,GROUND_Y,0,GROUND_Y+PATH_H);
  pg.addColorStop(0,'#555'); pg.addColorStop(1,'#383838');
  ctx.fillStyle = pg; ctx.fillRect(0,GROUND_Y,VW,PATH_H);
  ctx.fillStyle = '#e8e0c0';
  ctx.fillRect(0,GROUND_Y,VW,2.5);
  ctx.fillRect(0,GROUND_Y+PATH_H-2.5,VW,2.5);
  ctx.fillStyle = '#f5d020';
  ctx.fillRect(0,GROUND_Y+PATH_H/2-2,VW,2);
  // Scrolling dashes
  ctx.fillStyle = 'rgba(240,230,200,.75)';
  for (const d of dashMarkers) {
    const sx = wx2sx(d.wx);
    if (sx < -46 || sx > VW) continue;
    ctx.fillRect(sx, GROUND_Y+4, 28, 2);
    ctx.fillRect(sx, GROUND_Y+PATH_H-6, 28, 2);
  }
}

function drawBeach() {
  const sg = ctx.createLinearGradient(0,GROUND_Y+PATH_H,0,WATER_Y);
  sg.addColorStop(0,'#dbbe6e'); sg.addColorStop(1,'#a07830');
  ctx.fillStyle = sg; ctx.fillRect(0,GROUND_Y+PATH_H,VW,BEACH_H+2);
  ctx.fillStyle = 'rgba(140,100,35,.35)';
  for (const p of pebbles) {
    const sx = wx2sx(p.wx);
    if (sx < -5 || sx > VW+5) continue;
    ctx.fillRect(sx, p.y, p.w, 1.2);
  }
  ctx.fillStyle = 'rgba(180,210,230,.3)'; ctx.fillRect(0,WATER_Y-2,VW,2);
}

function drawOcean() {
  const og = ctx.createLinearGradient(0,WATER_Y,0,VH);
  og.addColorStop(0,'#1a6aaa'); og.addColorStop(1,'#0a2858');
  ctx.fillStyle = og; ctx.fillRect(0,WATER_Y,VW,VH-WATER_Y);
  for (const w of waves) {
    const wy = w.y + Math.sin(frame*.04+w.ph)*2.5;
    ctx.fillStyle = 'rgba(255,255,255,.38)';
    ctx.beginPath(); ctx.moveTo(w.x,wy);
    ctx.bezierCurveTo(w.x+w.w*.28,wy-4,w.x+w.w*.72,wy-4,w.x+w.w,wy);
    ctx.bezierCurveTo(w.x+w.w*.72,wy+1.5,w.x+w.w*.28,wy+1.5,w.x,wy); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.7)';
    ctx.fillRect(w.x+w.w*.18,wy-.5,w.w*.64,1);
  }
}

function drawWheelSpin(cx, cy, r, angle) {
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
  ctx.strokeStyle = 'rgba(255,255,255,.22)'; ctx.lineWidth = .8;
  for (let i = 0; i < 8; i++) {
    const a = i*Math.PI/4;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*3,Math.sin(a)*3);
    ctx.lineTo(Math.cos(a)*r*.86,Math.sin(a)*r*.86); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,220,.52)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,0,r*.72,-.5,.9); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,200,.68)';
  ctx.beginPath(); ctx.arc(Math.cos(-.5)*r*.72,Math.sin(-.5)*r*.72,1.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawTrike() {
  const sx = Math.round(wx2sx(trike.wx));
  const sy = Math.round(GROUND_Y - SH);
  drawWheelSpin(sx+FWX, sy+FWY, WR, wheelAngle);
  drawWheelSpin(sx+RWX, sy+RWY, WR, wheelAngle);
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(IMG, sx, sy, SW, SH);
  ctx.imageSmoothingEnabled = false;
}

function drawLemon(l) {
  const sx = wx2sx(l.wx);
  ctx.save(); ctx.translate(sx, l.y); ctx.rotate(l.rot);
  const r = l.r;
  ctx.fillStyle = '#f5d020'; ctx.beginPath(); ctx.ellipse(0,0,r,r*.8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffe95a'; ctx.beginPath(); ctx.ellipse(-r*.2,-r*.22,r*.3,r*.24,-.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#c8a000';
  ctx.beginPath(); ctx.ellipse(-r*.84,0,r*.15,r*.08,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( r*.84,0,r*.15,r*.08,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#a07000'; ctx.lineWidth = .8;
  ctx.beginPath(); ctx.ellipse(0,0,r,r*.8,0,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawParticles() {
  for (const p of parts) {
    ctx.globalAlpha = p.life;
    if (p.text) {
      ctx.fillStyle = p.color; ctx.font = "bold 11px 'Courier New'"; ctx.textAlign = 'center';
      ctx.fillText(p.text, p.sx, p.sy);
    } else {
      ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.sx,p.sy,p.r*p.life,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function showOverlay(title, sub, blink) {
  ctx.fillStyle = 'rgba(0,8,28,.78)'; ctx.fillRect(0,0,VW,VH);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f5d020'; ctx.font = "bold 28px 'Courier New'"; ctx.fillText(title,VW/2,VH/2-40);
  ctx.fillStyle = '#fff';    ctx.font = "13px 'Courier New'";     ctx.fillText(sub,  VW/2,VH/2-10);
  if (blink && Math.floor(frame/22)%2) {
    ctx.fillStyle = '#a8d8ff'; ctx.font = "12px 'Courier New'"; ctx.fillText(blink,VW/2,VH/2+18);
  }
}

// ── Game loop ─────────────────────────────────────────────────────

function drawPowerup(pu) {
  const sx = pu.wx - camX;
  if (sx < -50 || sx > VW + 50) return;
  const r = pu.r;
  // Outer glow
  const pulse = 0.5 + 0.5 * Math.sin(frame * 0.15);
  ctx.globalAlpha = 0.3 + pulse * 0.2;
  ctx.fillStyle = pu.type === 'speed' ? '#ffe000' : '#cc44cc';
  ctx.beginPath(); ctx.arc(sx, pu.y, r * 1.5, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.translate(sx, pu.y);
  ctx.rotate(pu.rot);

  if (pu.type === 'speed') {
    ctx.fillStyle = '#ffe000';
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff9cc';
    ctx.beginPath(); ctx.arc(0, 0, r*0.64, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e08000';
    ctx.beginPath();
    ctx.moveTo(2, -r*0.56); ctx.lineTo(-3, -r*0.04); ctx.lineTo(1.5, -r*0.04);
    ctx.lineTo(-2, r*0.56); ctx.lineTo(3, r*0.08); ctx.lineTo(-0.5, r*0.08);
    ctx.lineTo(4, -r*0.56); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#aa6600'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  } else {
    ctx.fillStyle = '#bb33bb';
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ee88ee';
    ctx.beginPath(); ctx.arc(0, 0, r*0.64, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#550055'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-r*0.4, -r*0.42);
    ctx.lineTo(-r*0.4, r*0.08);
    ctx.arc(0, r*0.08, r*0.4, Math.PI, 0, false);
    ctx.lineTo(r*0.4, -r*0.42);
    ctx.stroke();
    ctx.strokeStyle = '#ff2222'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-r*0.4,-r*0.42); ctx.lineTo(-r*0.4,-r*0.6); ctx.stroke();
    ctx.strokeStyle = '#2222ff';
    ctx.beginPath(); ctx.moveTo(r*0.4,-r*0.42); ctx.lineTo(r*0.4,-r*0.6); ctx.stroke();
    ctx.strokeStyle = '#770077'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();

  ctx.globalAlpha = 0.75;
  ctx.fillStyle = '#fff'; ctx.font = "bold 8px 'Courier New'"; ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(pu.duration/60)+'s', sx, pu.y + r + 10);
  ctx.globalAlpha = 1;
}

function drawActivePowerupOverlays() {
  if (activeSuperSpeed > 0) {
    const a = 0.06 + 0.08 * Math.abs(Math.sin(frame*0.25));
    ctx.strokeStyle = 'rgba(255,220,0,'+a+')'; ctx.lineWidth = 1;
    for (let i = 0; i < 14; i++) {
      const ly = 8 + i*16 + Math.sin(frame*0.15+i)*5;
      const lx = ((i*65 + frame*10) % (VW+60) + VW+60) % (VW+60) - 30;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx+34, ly); ctx.stroke();
    }
  }
  if (activeMagnet > 0) {
    const tsx = trike.wx - camX;
    const bCx = tsx + (BKT_L + BKT_R) / 2;
    const bCy = GROUND_Y - SH + (BKT_T + BKT_B) / 2;
    const pulse = 0.3 + 0.22*Math.sin(frame*0.18);
    const rad = 36 + 8*Math.sin(frame*0.12);
    ctx.strokeStyle = 'rgba(200,60,255,'+pulse+')'; ctx.lineWidth = 2;
    ctx.setLineDash([5,4]); ctx.beginPath(); ctx.arc(bCx, bCy, rad, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }
}


function drawGiantLemon() {
  const sx = giantLemon.wx - camX;
  const r  = giantLemon.r;
  const sy = GROUND_Y - r + 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.beginPath();
  ctx.ellipse(sx, GROUND_Y + 3, r * 0.88, 8, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(giantLemon.rot);

  // Body
  ctx.fillStyle = '#f0c800';
  ctx.beginPath(); ctx.ellipse(0, 0, r, r*0.82, 0, 0, Math.PI*2); ctx.fill();
  // Dark shading
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(r*0.15, r*0.2, r*0.65, r*0.52, 0.4, 0, Math.PI*2); ctx.fill();
  // Bright highlight
  ctx.fillStyle = '#ffe95a';
  ctx.beginPath(); ctx.ellipse(-r*0.28, -r*0.28, r*0.38, r*0.3, -0.5, 0, Math.PI*2); ctx.fill();
  // Specular
  ctx.fillStyle = 'rgba(255,255,210,0.75)';
  ctx.beginPath(); ctx.ellipse(-r*0.32, -r*0.34, r*0.13, r*0.1, -0.5, 0, Math.PI*2); ctx.fill();
  // Tip nubs
  ctx.fillStyle = '#9a7200';
  ctx.beginPath(); ctx.ellipse(-r*0.88, 0, r*0.11, r*0.065, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( r*0.88, 0, r*0.11, r*0.065, 0, 0, Math.PI*2); ctx.fill();
  // Outline
  ctx.strokeStyle = '#a07000'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(0, 0, r, r*0.82, 0, 0, Math.PI*2); ctx.stroke();
  // Rolling spoke lines
  ctx.strokeStyle = 'rgba(140,100,0,0.22)'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r*0.18, Math.sin(a)*r*0.18);
    ctx.lineTo(Math.cos(a)*r*0.78, Math.sin(a)*r*0.78);
    ctx.stroke();
  }
  ctx.restore();

  // Off-screen left arrow indicator
  if (sx < -r) {
    const pulse = 0.55 + 0.45 * Math.sin(frame * 0.2);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f5d020';
    ctx.font = "bold 13px 'Courier New'"; ctx.textAlign = 'left';
    ctx.fillText('\u25c4 GIANT LEMON', 6, GROUND_Y - SH/2);
    ctx.globalAlpha = 1;
  } else {
    // On-screen: show !! warning when trike is within ~60% of screen width
    const screenDist = (trike.wx - camX) - sx - r;
    if (screenDist > 0 && screenDist < VW * 0.7) {
      const pulse = 0.5 + 0.5 * Math.sin(frame * 0.28);
      ctx.globalAlpha = Math.max(0, 1 - screenDist/(VW*0.7)) * (0.6 + pulse*0.4);
      ctx.fillStyle = '#ff4400';
      ctx.font = "bold 16px 'Courier New'"; ctx.textAlign = 'center';
      ctx.fillText('!!', sx, sy - r - 8);
      ctx.globalAlpha = 1;
    }
  }
}


function drawPowerup(pu) {
  const sx = pu.wx - camX;
  if (sx < -50 || sx > VW + 50) return;
  const s = pu.r * 1.7;  // box half-size
  const x = sx - s, y = pu.y - s, w = s*2, h = s*2;

  ctx.save();
  ctx.translate(sx, pu.y);
  ctx.rotate(pu.rot * 0.3); // slight wobble, not full spin

  if (pu.type === 'speed') {
    // Yellow box
    ctx.fillStyle = '#ffe000';
    ctx.fillRect(-s, -s, w, h);
    // Inner lighter panel
    ctx.fillStyle = '#fff5a0';
    ctx.fillRect(-s+3, -s+3, w-6, h-6);
    // Lightning bolt
    ctx.fillStyle = '#e07000';
    ctx.beginPath();
    ctx.moveTo(3, -s*0.55); ctx.lineTo(-4, -s*0.02); ctx.lineTo(1, -s*0.02);
    ctx.lineTo(-3, s*0.55); ctx.lineTo(4, s*0.08); ctx.lineTo(-1, s*0.05);
    ctx.lineTo(5, -s*0.55); ctx.closePath(); ctx.fill();
    // Box outline
    ctx.strokeStyle = '#aa7700'; ctx.lineWidth = 2;
    ctx.strokeRect(-s, -s, w, h);
    // Corner screws
    ctx.fillStyle = '#aa7700';
    for (const [cx,cy] of [[-s+3,-s+3],[s-3,-s+3],[-s+3,s-3],[s-3,s-3]]) {
      ctx.beginPath(); ctx.arc(cx,cy,1.5,0,Math.PI*2); ctx.fill();
    }
  } else {
    // Pink/purple box
    ctx.fillStyle = '#aa22aa';
    ctx.fillRect(-s, -s, w, h);
    ctx.fillStyle = '#dd88dd';
    ctx.fillRect(-s+3, -s+3, w-6, h-6);
    // Magnet U shape
    ctx.strokeStyle = '#440044'; ctx.lineWidth = 2.8; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-s*0.42, -s*0.44);
    ctx.lineTo(-s*0.42, s*0.08);
    ctx.arc(0, s*0.08, s*0.42, Math.PI, 0, false);
    ctx.lineTo(s*0.42, -s*0.44);
    ctx.stroke();
    ctx.strokeStyle = '#ff2222'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.moveTo(-s*0.42,-s*0.44); ctx.lineTo(-s*0.42,-s*0.62); ctx.stroke();
    ctx.strokeStyle = '#2222ff';
    ctx.beginPath(); ctx.moveTo(s*0.42,-s*0.44); ctx.lineTo(s*0.42,-s*0.62); ctx.stroke();
    ctx.strokeStyle = '#770077'; ctx.lineWidth = 2;
    ctx.strokeRect(-s, -s, w, h);
    ctx.fillStyle = '#770077';
    for (const [cx,cy] of [[-s+3,-s+3],[s-3,-s+3],[-s+3,s-3],[s-3,s-3]]) {
      ctx.beginPath(); ctx.arc(cx,cy,1.5,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();

  // Duration label
  ctx.globalAlpha = 0.8;
  ctx.fillStyle = '#fff'; ctx.font = "bold 8px 'Courier New'"; ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(pu.duration/60)+'s', sx, pu.y + s + 10);
  ctx.globalAlpha = 1;
}

function render() {
  ctx.clearRect(0,0,VW,VH);
  drawSky(); drawSun(); drawSeagulls(); drawClouds();
  // Only draw palms visible on screen
  for (const p of palmTrees) {
    const sx = wx2sx(p.wx);
    if (sx < -80 || sx > VW+80) continue;
    drawPalm(sx, GROUND_Y, p.h);
  }
  drawPath(); drawBeach(); drawOcean();
  drawGiantLemon();
  drawParticles(); drawTrike();
  for (const pu of powerups) drawPowerup(pu);
  for (const l of lemons) drawLemon(l);
  drawActivePowerupOverlays();

  if (state === 'title')
    showOverlay('OH WOW CYCLES', '◄ ►  Steer to catch lemons in the cargo box', 'PRESS ANY KEY TO START');
  if (state === 'over') {
    const reason = strikes >= 10 ? 'SQUISHED BY GIANT LEMON!' : 'TOO MANY LEMONS MISSED!';
    showOverlay('GAME OVER', reason + '  SCORE: ' + score, 'TAP TO PLAY AGAIN');
  }
}

function loop() {
  if (state === 'playing') update();
  else frame++;
  render();
  requestAnimationFrame(loop);
}

function startGame() { if (state !== 'playing') { state = 'playing'; resetGame(); } }
document.addEventListener('keydown', e => { keys[e.key] = true;  startGame(); });
document.addEventListener('keyup',   e => { keys[e.key] = false; });
canvas.addEventListener('pointerdown', startGame);

function holdBtn(btn, setFn) {
  btn.addEventListener('pointerdown',  e => { e.preventDefault(); btn.classList.add('held');    setFn(true);  startGame(); });
  btn.addEventListener('pointerup',    e => { e.preventDefault(); btn.classList.remove('held'); setFn(false); });
  btn.addEventListener('pointerleave', e => { e.preventDefault(); btn.classList.remove('held'); setFn(false); });
  btn.addEventListener('touchstart',   e => { e.preventDefault(); btn.classList.add('held');    setFn(true);  startGame(); }, {passive:false});
  btn.addEventListener('touchend',     e => { e.preventDefault(); btn.classList.remove('held'); setFn(false); }, {passive:false});
}
holdBtn(document.getElementById('btnL'), v => holdL = v);
